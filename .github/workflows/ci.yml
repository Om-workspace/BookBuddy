name: CI Pipeline

on:
  push:
    branches:
        - main
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
    
      - name: Install dependencies
        working-directory: ./bookbuddy-ai
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
    
      - name: Check Python syntax
        working-directory: ./bookbuddy-ai
        run: |
          python -m py_compile $(find . -name "*.py")

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
