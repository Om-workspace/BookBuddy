version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    restart: on-failure
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/bookbuddy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookbuddy
    ports:
      - "5432:5432"
